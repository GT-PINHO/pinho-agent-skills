name: Quality Gate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run quality gate
        run: node scripts/quality-gate.mjs

      - name: Run static evals
        run: node scripts/run-evals.mjs

      - name: Fail if INDEX.md drifted
        run: |
          if ! git diff --exit-code -- skills/INDEX.md; then
            echo "::error::skills/INDEX.md is out of date. Run 'npm run quality' locally and commit the result."
            exit 1
          fi
